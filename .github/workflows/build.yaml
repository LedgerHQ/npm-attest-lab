name: SLSA Generator Custom NodeJS

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: public-ledgerhq-shared-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4
      - name: Build steps
        run: |
          echo "Building the project"
          npm pack 
      - name: Get npm package filename
        id: package-info
        run: |
          PACKAGE_PATH=$(ls -1 *.tgz | head -n 1)
          pack_json=$(npm pack $PACKAGE_PATH --json | tee pack.json | jq -c)
          jq <pack.json
          PACKAGE_FILENAME=$(echo "$pack_json" | jq -r '.[0].filename')
          echo "PACKAGE_FILENAME=${PACKAGE_FILENAME}" >> $GITHUB_OUTPUT

      - name: Login to JFrog Ledger
        id: jfrog-login
        uses: LedgerHQ/actions-security/actions/jfrog-login@actions/jfrog-login-1

      - name: Configure npm authentication
        run: |
          echo "registry=https://jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/" > .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/:_authToken=${{ steps.jfrog-login.outputs.oidc-token }}" >> .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/:always-auth=true" >> .npmrc

      - name: Publish package to JFrog Ledger with npm
        run: |
          npm publish --tag tagtesting

      - name: Attest for npmjs.com
        uses: LedgerHQ/actions-security/actions/attest-for-npmsjs-com@attest-npm-dir-support
        with:
          subject-path: ${{ steps.package-info.outputs.PACKAGE_FILENAME }}

      - name: Debug - raw API response
        if: always()
        run: |
          OIDC_TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://api.security.ledger.com" \
            | jq -r '.value')
          echo "::add-mask::$OIDC_TOKEN"
          echo "Waiting 60s for publish pipeline..."
          sleep 60
          PACKAGE_NAME=$(tar xzf ${{ steps.package-info.outputs.PACKAGE_FILENAME }} -O package/package.json | jq -r '.name')
          PACKAGE_VERSION=$(tar xzf ${{ steps.package-info.outputs.PACKAGE_FILENAME }} -O package/package.json | jq -r '.version')
          ENCODED_NAME=$(echo -n "$PACKAGE_NAME" | jq -sRr @uri)
          echo "Querying: type=npm&name=${ENCODED_NAME}&version=${PACKAGE_VERSION}"
          curl -s -H "Authorization: Bearer $OIDC_TOKEN" \
            "https://api.security.ledger.com/oss-supply-chain/api/deployments/status?type=npm&name=${ENCODED_NAME}&version=${PACKAGE_VERSION}" | jq .

      - name: Check deployment status
        uses: LedgerHQ/actions-security/actions/check-npm-deployment@xchalle/fix-check-npm-deployment
        with:
          tarball-path: ${{ steps.package-info.outputs.PACKAGE_FILENAME }}

