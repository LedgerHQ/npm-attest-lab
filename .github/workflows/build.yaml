name: SLSA Generator Custom NodeJS

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  DEPLOYMENT_API_URL: "https://api.security.ledger.com/oss-supply-chain"
  DEPLOYMENT_POLL_INTERVAL: 10
  DEPLOYMENT_POLL_MAX_ATTEMPTS: 30

jobs:
  build:
    runs-on: public-ledgerhq-shared-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4
      - name: Build steps
        run: |
          echo "Building the project"
          npm pack 
      - name: Get npm package filename
        id: package-info
        run: |
          PACKAGE_PATH=$(ls -1 *.tgz | head -n 1) # To be change with the action as input

          pack_json=$(npm pack $PACKAGE_PATH --json | tee pack.json | jq -c)
          jq <pack.json
          
          PACKAGE_FILENAME=$(echo "$pack_json" | jq -r '.[0].filename')
          PACKAGE_NAME=$(echo "$pack_json" | jq -r '.[0].name')
          PACKAGE_VERSION=$(echo "$pack_json" | jq -r '.[0].version')
          echo "PACKAGE_FILENAME=${PACKAGE_FILENAME}" >> $GITHUB_OUTPUT
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_OUTPUT
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Login to JFrog Ledger
        id: jfrog-login
        uses: LedgerHQ/actions-security/actions/jfrog-login@actions/jfrog-login-1

      - name: Configure npm authentication
        run: |
          echo "registry=https://jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/" > .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/:_authToken=${{ steps.jfrog-login.outputs.oidc-token }}" >> .npmrc
          echo "//jfrog.ledgerlabs.net/artifactory/api/npm/cybersec-npm-sandbox-public/:always-auth=true" >> .npmrc

      - name: Publish package to JFrog Ledger with npm
        run: |
          npm publish --tag tagtesting

      - name: Attest for npmjs.com
        uses: LedgerHQ/actions-security/actions/attest-for-npmsjs-com@attest-npm-dir-support
        with:
          subject-path: ${{ steps.package-info.outputs.PACKAGE_FILENAME }}  

      - name: Wait for deployment via api-oss-software-supply-chain
        id: deployment-check
        run: |
          PACKAGE_NAME="${{ steps.package-info.outputs.PACKAGE_NAME }}"
          PACKAGE_VERSION="${{ steps.package-info.outputs.PACKAGE_VERSION }}"
          
          echo "Checking deployment status for ${PACKAGE_NAME}@${PACKAGE_VERSION}"
          
          ENCODED_NAME=$(echo "${PACKAGE_NAME}" | jq -sRr @uri)
          STATUS_URL="${DEPLOYMENT_API_URL}/api/deployments/status?type=npm&name=${ENCODED_NAME}&version=${PACKAGE_VERSION}"
          
          attempt=0
          while [ $attempt -lt $DEPLOYMENT_POLL_MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            echo "Poll attempt ${attempt}/${DEPLOYMENT_POLL_MAX_ATTEMPTS}..."
            
            RESPONSE=$(curl -s -f -H "x-api-key: ${{ secrets.SUPPLY_CHAIN_API_KEY }}" "${STATUS_URL}" 2>&1) || {
              echo "API request failed (attempt ${attempt}), retrying in ${DEPLOYMENT_POLL_INTERVAL}s..."
              sleep "${DEPLOYMENT_POLL_INTERVAL}"
              continue
            }
            
            STATUS=$(echo "${RESPONSE}" | jq -r '.results[0].status')
            echo "Deployment status: ${STATUS}"
            
            case "${STATUS}" in
              success)
                echo "Deployment successful!"
                echo "status=success" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              failed)
                ERROR_CODE=$(echo "${RESPONSE}" | jq -r '.results[0].error_code // "unknown"')
                ERROR_MSG=$(echo "${RESPONSE}" | jq -r '.results[0].error // "no details"')
                echo "::error::Deployment failed: [${ERROR_CODE}] ${ERROR_MSG}"
                echo "status=failed" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
              queued|in_progress)
                echo "Deployment ${STATUS}, waiting ${DEPLOYMENT_POLL_INTERVAL}s..."
                sleep "${DEPLOYMENT_POLL_INTERVAL}"
                ;;
              unknown)
                echo "Package not yet seen by the API, waiting ${DEPLOYMENT_POLL_INTERVAL}s..."
                sleep "${DEPLOYMENT_POLL_INTERVAL}"
                ;;
              *)
                echo "::warning::Unexpected status: ${STATUS}"
                sleep "${DEPLOYMENT_POLL_INTERVAL}"
                ;;
            esac
          done
          
          echo "::error::Deployment status check timed out after $((DEPLOYMENT_POLL_MAX_ATTEMPTS * DEPLOYMENT_POLL_INTERVAL))s"
          echo "status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

