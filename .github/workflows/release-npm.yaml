name: Release to npm

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing
  attestations: write

jobs:
  publish:
    runs-on: ledgerhq-shared-small
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@8f152de45cc393bb48ce5d89d36b731f54556e65 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Ensure npm 11.5.1 or later for trusted publishing
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build steps
        run: |
          echo "Building the project"
          npm pack

      - name: Get npm package filename
        id: package-info
        run: |
          PACKAGE_PATH=$(ls -1 *.tgz | head -n 1)

          pack_json=$(npm pack $PACKAGE_PATH --json | tee pack.json | jq -c)
          jq <pack.json
          
          PACKAGE_FILENAME=$(echo "$pack_json" | jq -r '.[0].filename')
          echo "PACKAGE_FILENAME=${PACKAGE_FILENAME}" >> $GITHUB_OUTPUT

      # Publish with trusted publishing (OIDC) - no token needed
      # Provenance is automatically generated when using trusted publishing
      - name: Publish package to npm with provenance
        run: npm publish ${{ steps.package-info.outputs.PACKAGE_FILENAME }} --provenance --access public

      - name: Attest for npmjs.com
        uses: LedgerHQ/actions-security/actions/attest-for-npmsjs-com@attest-npm-dir-support
        with:
          subject-path: ${{ steps.package-info.outputs.PACKAGE_FILENAME }}
